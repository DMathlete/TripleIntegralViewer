<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple Integrals — Coordinate Systems</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #root { max-width: 1200px; margin: 0 auto; padding: 16px; }
  mjx-container { color: #e0e0e0 !important; }
</style>
<script>
MathJax = {
  tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] },
  chtml: { scale: 1.05 },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ═══════════════════════════════════════════════
   CORE UTILITIES & 3D PROJECTION
   ═══════════════════════════════════════════════ */

function project(x, y, z, rotX, rotY, scale, cx, cy) {
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  let x1 = x * cosY - z * sinY, z1 = x * sinY + z * cosY;
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  let y1 = y * cosX - z1 * sinX, z2 = y * sinX + z1 * cosX;
  return { px: cx + x1 * scale, py: cy - y1 * scale, depth: z2 };
}

// Z-up projection: swaps y and z so z is vertical
function P(x, y, z, rx, ry, s, cx, cy) {
  return project(x, z, y, rx, ry, s, cx, cy);
}

/* ═══════════════════════════════════════════════
   FORMAT UTILITIES
   ═══════════════════════════════════════════════ */

const PI_STEP = Math.PI / 60; // ≈0.052, hits π/6, π/4, π/3, π/2, π, 2π exactly

function snapRad(v) {
  for (const d of [1,2,3,4,6]) {
    const n = Math.round(v / Math.PI * d);
    if (Math.abs(v - n * Math.PI / d) < 0.06) return n * Math.PI / d;
  }
  return v;
}

function fmtRad(v) {
  if (Math.abs(v) < 0.01) return "0";
  const r = v / Math.PI;
  if (Math.abs(r - Math.round(r)) < 0.03) {
    const n = Math.round(r);
    return n === 1 ? "π" : n === -1 ? "-π" : n + "π";
  }
  for (const d of [2,3,4,6]) {
    const n = Math.round(r * d);
    if (Math.abs(r - n/d) < 0.03) {
      if (n === 1) return "π/" + d;
      if (n === -1) return "-π/" + d;
      return n + "π/" + d;
    }
  }
  return v.toFixed(2);
}

function fmtRadTex(v) {
  if (Math.abs(v) < 0.01) return "0";
  const r = v / Math.PI;
  if (Math.abs(r - Math.round(r)) < 0.03) {
    const n = Math.round(r);
    return n === 1 ? "\\pi" : n === -1 ? "-\\pi" : n + "\\pi";
  }
  for (const d of [2,3,4,6]) {
    const n = Math.round(r * d);
    if (Math.abs(r - n/d) < 0.03) {
      if (n === 1) return "\\frac{\\pi}{" + d + "}";
      if (n === -1) return "-\\frac{\\pi}{" + d + "}";
      return "\\frac{" + n + "\\pi}{" + d + "}";
    }
  }
  return v.toFixed(2);
}

/* ═══════════════════════════════════════════════
   DRAWING HELPERS
   ═══════════════════════════════════════════════ */

function drawAxes(ctx, rx, ry, s, cx, cy, len = 2.2, fs = 14) {
  const axes = [
    { dir: [len,0,0], label: "x", color: "#ff6b6b" },
    { dir: [0,len,0], label: "y", color: "#51cf66" },
    { dir: [0,0,len], label: "z", color: "#74c0fc" },
  ];
  const o = P(0,0,0,rx,ry,s,cx,cy);
  ctx.setLineDash([3,3]); ctx.lineWidth = 0.8;
  axes.forEach(({dir, color}) => {
    const p = P(-dir[0]*0.6, -dir[1]*0.6, -dir[2]*0.6, rx,ry,s,cx,cy);
    ctx.beginPath(); ctx.moveTo(o.px, o.py); ctx.lineTo(p.px, p.py);
    ctx.strokeStyle = color; ctx.globalAlpha = 0.3; ctx.stroke(); ctx.globalAlpha = 1;
  });
  ctx.setLineDash([]);
  axes.forEach(({dir, label, color}) => {
    const p = P(...dir, rx,ry,s,cx,cy);
    ctx.beginPath(); ctx.moveTo(o.px, o.py); ctx.lineTo(p.px, p.py);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = color; ctx.font = "bold " + fs + "px monospace"; ctx.fillText(label, p.px+4, p.py-4);
  });
}

function drawGrid(ctx, rx, ry, s, cx, cy) {
  ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 0.5;
  for (let i = -2; i <= 2; i += 0.5) {
    let a = P(i,-2,0,rx,ry,s,cx,cy), b = P(i,2,0,rx,ry,s,cx,cy);
    ctx.beginPath(); ctx.moveTo(a.px,a.py); ctx.lineTo(b.px,b.py); ctx.stroke();
    a = P(-2,i,0,rx,ry,s,cx,cy); b = P(2,i,0,rx,ry,s,cx,cy);
    ctx.beginPath(); ctx.moveTo(a.px,a.py); ctx.lineTo(b.px,b.py); ctx.stroke();
  }
}

function drawBox3d(ctx, rx, ry, s, cx, cy, xr, yr, zr, color = "rgba(80,160,255,0.38)") {
  const [x0,x1]=xr, [y0,y1]=yr, [z0,z1]=zr;
  const V = [[x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0],[x0,y0,z1],[x1,y0,z1],[x1,y1,z1],[x0,y1,z1]];
  const F = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]];
  const pv = V.map(v => P(...v, rx,ry,s,cx,cy));
  const fd = F.map(f => ({ f, d: f.reduce((a,i)=>a+pv[i].depth,0)/4 }));
  fd.sort((a,b) => a.d - b.d);
  fd.forEach(({f}) => {
    ctx.beginPath(); f.forEach((i,j) => j===0 ? ctx.moveTo(pv[i].px,pv[i].py) : ctx.lineTo(pv[i].px,pv[i].py));
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = color.replace(/[\d.]+\)$/,"0.7)"); ctx.lineWidth = 1.2; ctx.stroke();
  });
}

function drawCylWedgeSolid(ctx, rx, ry, s, cx, cy, rMin, rMax, tMin, tMax, zMin, zMax, fillColor="rgba(80,210,170,0.35)", strokeColor="rgba(80,210,170,0.7)", n=28) {
  tMin = snapRad(tMin); tMax = snapRad(tMax);
  const faces = [];
  // Top face
  const top = [];
  for (let i=0;i<=n;i++){const t=tMin+(tMax-tMin)*i/n; top.push(P(rMax*Math.cos(t),rMax*Math.sin(t),zMax,rx,ry,s,cx,cy));}
  for (let i=n;i>=0;i--){const t=tMin+(tMax-tMin)*i/n; top.push(P(rMin*Math.cos(t),rMin*Math.sin(t),zMax,rx,ry,s,cx,cy));}
  faces.push({pts:top,d:top.reduce((a,p)=>a+p.depth,0)/top.length});
  // Bottom face
  const bot = [];
  for (let i=0;i<=n;i++){const t=tMin+(tMax-tMin)*i/n; bot.push(P(rMax*Math.cos(t),rMax*Math.sin(t),zMin,rx,ry,s,cx,cy));}
  for (let i=n;i>=0;i--){const t=tMin+(tMax-tMin)*i/n; bot.push(P(rMin*Math.cos(t),rMin*Math.sin(t),zMin,rx,ry,s,cx,cy));}
  faces.push({pts:bot,d:bot.reduce((a,p)=>a+p.depth,0)/bot.length});
  // Outer curved face strips
  for (let i=0;i<n;i++){
    const t0=tMin+(tMax-tMin)*i/n, t1=tMin+(tMax-tMin)*(i+1)/n;
    const strip=[P(rMax*Math.cos(t0),rMax*Math.sin(t0),zMin,rx,ry,s,cx,cy),P(rMax*Math.cos(t1),rMax*Math.sin(t1),zMin,rx,ry,s,cx,cy),
                 P(rMax*Math.cos(t1),rMax*Math.sin(t1),zMax,rx,ry,s,cx,cy),P(rMax*Math.cos(t0),rMax*Math.sin(t0),zMax,rx,ry,s,cx,cy)];
    faces.push({pts:strip,d:strip.reduce((a,p)=>a+p.depth,0)/4});
  }
  // Inner curved face strips
  if (rMin > 0.01) {
    for (let i=0;i<n;i++){
      const t0=tMin+(tMax-tMin)*i/n, t1=tMin+(tMax-tMin)*(i+1)/n;
      const strip=[P(rMin*Math.cos(t0),rMin*Math.sin(t0),zMin,rx,ry,s,cx,cy),P(rMin*Math.cos(t1),rMin*Math.sin(t1),zMin,rx,ry,s,cx,cy),
                   P(rMin*Math.cos(t1),rMin*Math.sin(t1),zMax,rx,ry,s,cx,cy),P(rMin*Math.cos(t0),rMin*Math.sin(t0),zMax,rx,ry,s,cx,cy)];
      faces.push({pts:strip,d:strip.reduce((a,p)=>a+p.depth,0)/4});
    }
  }
  // Flat radial faces
  for (const t of [tMin, tMax]) {
    const f=[P(rMin*Math.cos(t),rMin*Math.sin(t),zMin,rx,ry,s,cx,cy),P(rMax*Math.cos(t),rMax*Math.sin(t),zMin,rx,ry,s,cx,cy),
             P(rMax*Math.cos(t),rMax*Math.sin(t),zMax,rx,ry,s,cx,cy),P(rMin*Math.cos(t),rMin*Math.sin(t),zMax,rx,ry,s,cx,cy)];
    faces.push({pts:f,d:f.reduce((a,p)=>a+p.depth,0)/4});
  }
  faces.sort((a,b)=>a.d-b.d);
  faces.forEach(({pts})=>{
    ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py)); ctx.closePath();
    ctx.fillStyle=fillColor; ctx.fill(); ctx.strokeStyle=strokeColor; ctx.lineWidth=0.6; ctx.stroke();
  });
}

function drawSphWedgeSolid(ctx, rx, ry, s, cx, cy, rhoMin, rhoMax, tMin, tMax, phiMin, phiMax, fillColor="rgba(150,120,255,0.32)", strokeColor="rgba(150,120,255,0.6)", n=36) {
  // Snap bounds to exact multiples of pi so poles/seams meet cleanly
  phiMin = snapRad(phiMin); phiMax = snapRad(phiMax);
  tMin = snapRad(tMin); tMax = snapRad(tMax);
  const faces = [];
  const pt = (rho,t,phi) => P(rho*Math.sin(phi)*Math.cos(t),rho*Math.sin(phi)*Math.sin(t),rho*Math.cos(phi),rx,ry,s,cx,cy);
  // Outer sphere patches
  for (let i=0;i<n;i++) for (let j=0;j<n;j++){
    const t0=tMin+(tMax-tMin)*i/n,t1=tMin+(tMax-tMin)*(i+1)/n;
    const p0=phiMin+(phiMax-phiMin)*j/n,p1=phiMin+(phiMax-phiMin)*(j+1)/n;
    const q=[pt(rhoMax,t0,p0),pt(rhoMax,t1,p0),pt(rhoMax,t1,p1),pt(rhoMax,t0,p1)];
    faces.push({pts:q,d:q.reduce((a,p)=>a+p.depth,0)/4});
  }
  // Inner sphere patches
  if (rhoMin>0.01) for (let i=0;i<n;i++) for (let j=0;j<n;j++){
    const t0=tMin+(tMax-tMin)*i/n,t1=tMin+(tMax-tMin)*(i+1)/n;
    const p0=phiMin+(phiMax-phiMin)*j/n,p1=phiMin+(phiMax-phiMin)*(j+1)/n;
    const q=[pt(rhoMin,t0,p0),pt(rhoMin,t1,p0),pt(rhoMin,t1,p1),pt(rhoMin,t0,p1)];
    faces.push({pts:q,d:q.reduce((a,p)=>a+p.depth,0)/4});
  }
  // Theta-boundary faces
  for (const t of [tMin, tMax]) {
    for (let j=0;j<n;j++){
      const p0=phiMin+(phiMax-phiMin)*j/n,p1=phiMin+(phiMax-phiMin)*(j+1)/n;
      const q=[pt(rhoMin,t,p0),pt(rhoMax,t,p0),pt(rhoMax,t,p1),pt(rhoMin,t,p1)];
      faces.push({pts:q,d:q.reduce((a,p)=>a+p.depth,0)/4});
    }
  }
  // Phi-boundary faces
  for (const phi of [phiMin, phiMax]) {
    for (let i=0;i<n;i++){
      const t0=tMin+(tMax-tMin)*i/n,t1=tMin+(tMax-tMin)*(i+1)/n;
      const q=[pt(rhoMin,t0,phi),pt(rhoMax,t0,phi),pt(rhoMax,t1,phi),pt(rhoMin,t1,phi)];
      faces.push({pts:q,d:q.reduce((a,p)=>a+p.depth,0)/4});
    }
  }
  faces.sort((a,b)=>a.d-b.d);
  faces.forEach(({pts})=>{
    ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py)); ctx.closePath();
    ctx.fillStyle=fillColor; ctx.fill(); ctx.strokeStyle=strokeColor; ctx.lineWidth=0.4; ctx.stroke();
  });
}

/* ═══════════════════════════════════════════════
   MATHJAX COMPONENTS
   ═══════════════════════════════════════════════ */

function Tex({ math }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.textContent = '$\\displaystyle ' + math + '$';
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetClear([ref.current]);
      window.MathJax.typesetPromise([ref.current]).catch(() => {});
    }
  }, [math]);
  return <span ref={ref} />;
}

function TexInline({ math }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.textContent = '$' + math + '$';
    if (window.MathJax && window.MathJax.typesetPromise) {
      window.MathJax.typesetClear([ref.current]);
      window.MathJax.typesetPromise([ref.current]).catch(() => {});
    }
  }, [math]);
  return <span ref={ref} />;
}

/* ═══════════════════════════════════════════════
   REUSABLE 3D SCENE COMPONENT
   ═══════════════════════════════════════════════ */

function Scene3D({ draw, deps = [] }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [size, setSize] = useState({ width: 530, height: 420 });
  const [rot, setRot] = useState({ x: -0.55, y: -2.4 });
  const [zoom, setZoom] = useState(1);
  const dragRef = useRef(false), lastRef = useRef({ x: 0, y: 0 });

  // Measure container and resize canvas to fill it
  useEffect(() => {
    const measure = () => {
      if (!containerRef.current) return;
      const w = containerRef.current.clientWidth;
      const h = Math.round(w * 0.75); // 4:3 aspect ratio
      setSize({ width: w, height: h });
    };
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  const { width, height } = size;

  useEffect(() => {
    const onMove = (e) => {
      if (!dragRef.current) return;
      e.preventDefault();
      const dx = e.clientX - lastRef.current.x;
      const dy = e.clientY - lastRef.current.y;
      setRot(prev => ({ x: prev.x + dy * 0.01, y: prev.y + dx * 0.01 }));
      lastRef.current = { x: e.clientX, y: e.clientY };
    };
    const onUp = () => { dragRef.current = false; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, []);

  const onDown = (e) => {
    e.preventDefault();
    dragRef.current = true;
    lastRef.current = { x: e.clientX, y: e.clientY };
  };

  const onTouchStart = (e) => {
    dragRef.current = true;
    lastRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  };

  const onTouchMove = (e) => {
    if (!dragRef.current) return;
    const dx = e.touches[0].clientX - lastRef.current.x;
    const dy = e.touches[0].clientY - lastRef.current.y;
    setRot(prev => ({ x: prev.x + dy * 0.01, y: prev.y + dx * 0.01 }));
    lastRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  };

  const onTouchEnd = () => { dragRef.current = false; };

  const onWheel = (e) => {
    e.preventDefault();
    setZoom(prev => Math.min(4, Math.max(0.3, prev * (e.deltaY < 0 ? 1.08 : 1/1.08))));
  };

  useEffect(() => {
    const c = canvasRef.current;
    c.addEventListener("wheel", (e) => e.preventDefault(), { passive: false });
    return () => {};
  }, []);

  useEffect(() => {
    const c = canvasRef.current, ctx = c.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    c.width = width * dpr;
    c.height = height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);
    draw(ctx, rot.x, rot.y, width, height, zoom);
  }, [rot.x, rot.y, width, height, zoom, ...deps]);

  const HOME = { x: -0.55, y: -2.4 };
  const views = [
    { label: "Home", rot: HOME },
    { label: "xy", rot: { x: -Math.PI/2, y: 0 } },
    { label: "xz", rot: { x: 0, y: 0 } },
    { label: "yz", rot: { x: 0, y: -Math.PI/2 } },
  ];

  return (
    <div ref={containerRef} style={{ position: "relative", width: "100%" }}>
      <canvas ref={canvasRef}
        style={{ width: "100%", height, cursor: "grab", borderRadius: 8, background: "#1a1a2e", display: "block", touchAction: "none" }}
        onMouseDown={onDown}
        onWheel={onWheel}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      />
      <div style={{ position: "absolute", top: 8, right: 8, display: "flex", gap: 4 }}>
        {views.map(v => (
          <button key={v.label} onClick={() => { setRot(v.rot); if (v.label==="Home") setZoom(1); }}
            style={{ padding: "3px 8px", borderRadius: 4, border: "none", cursor: "pointer",
              background: "rgba(255,255,255,0.1)", color: "#aaa", fontSize: 11, fontFamily: "monospace",
              backdropFilter: "blur(4px)" }}>
            {v.label}
          </button>
        ))}
        {zoom !== 1 && <button onClick={() => setZoom(1)}
          style={{ padding: "3px 8px", borderRadius: 4, border: "none", cursor: "pointer",
            background: "rgba(255,255,255,0.15)", color: "#74c0fc", fontSize: 11, fontFamily: "monospace",
            backdropFilter: "blur(4px)" }}>
          {Math.round(zoom*100)}%
        </button>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   UI COMPONENTS
   ═══════════════════════════════════════════════ */

function Slider({ label, value, onChange, min, max, step = 0.1, radians = false }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, margin:"4px 0" }}>
      <span style={{ width:56, fontSize:13, color:"#ccc", fontFamily:"monospace", flexShrink:0 }}>{label}</span>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e=>onChange(+e.target.value)}
        style={{ flex:1, accentColor:"#74c0fc" }} />
      <span style={{ width:50, fontSize:13, color:"#aaa", fontFamily:"monospace", textAlign:"right" }}>
        {radians ? fmtRad(value) : value.toFixed(1)}
      </span>
    </div>
  );
}

function Btn({active, onClick, children}) {
  return <button onClick={onClick} style={{ padding:"6px 16px", borderRadius:6, border:"none", cursor:"pointer",
    background: active ? "#74c0fc" : "#333", color: active ? "#000" : "#ccc",
    fontSize:13, fontWeight: active ? 600 : 400 }}>
    {children}
  </button>;
}

/* ═══════════════════════════════════════════════
   INTEGRAL DISPLAY
   ═══════════════════════════════════════════════ */

function IntegralDisplay({ sys, rx1, rx2, ry1, ry2, rz1, rz2, cr1, cr2, ct1, ct2, cz1, cz2, sr1, sr2, st1, st2, sp1, sp2 }) {
  const xA = rx1.toFixed(1), xB = rx2.toFixed(1);
  const yA = ry1.toFixed(1), yB = ry2.toFixed(1);
  const zA = rz1.toFixed(1), zB = rz2.toFixed(1);
  const rA = cr1.toFixed(1), rB = cr2.toFixed(1);
  const czA = cz1.toFixed(1), czB = cz2.toFixed(1);
  const ctA = fmtRadTex(ct1), ctB = fmtRadTex(ct2);
  const rhoA = sr1.toFixed(1), rhoB = sr2.toFixed(1);
  const stA = fmtRadTex(st1), stB = fmtRadTex(st2);
  const spA = fmtRadTex(sp1), spB = fmtRadTex(sp2);

  if (sys === "rect") {
    const vol = Math.abs((rx2-rx1) * (ry2-ry1) * (rz2-rz1));
    const integral = "V = \\int_{" + xA + "}^{" + xB + "} \\int_{" + yA + "}^{" + yB + "} \\int_{" + zA + "}^{" + zB + "} dz\\,dy\\,dx";
    const dx = (rx2-rx1).toFixed(1), dy = (ry2-ry1).toFixed(1), dz = (rz2-rz1).toFixed(1);
    const evalTex = "= (" + dx + ")(" + dy + ")(" + dz + ") = \\underline{" + vol.toFixed(3) + "}";
    return (
      <div style={{marginTop:12,padding:14,background:"#111827",borderRadius:8,borderLeft:"3px solid #74c0fc"}}>
        <Tex math={integral} />
        <div style={{marginTop:6}}><TexInline math={evalTex} /></div>
      </div>
    );
  }

  if (sys === "cyl") {
    const vol = (cr2*cr2-cr1*cr1)/2 * (snapRad(ct2)-snapRad(ct1)) * (cz2-cz1);
    const integral = "V = \\int_{" + ctA + "}^{" + ctB + "} \\int_{" + czA + "}^{" + czB + "} \\int_{" + rA + "}^{" + rB + "} r\\,dr\\,dz\\,d\\theta";
    const evalTex = "= \\left(" + ctB + "-" + ctA + "\\right)\\left(" + czB + "-" + czA + "\\right)\\cdot\\frac{" + rB + "^2-" + rA + "^2}{2} = \\underline{" + Math.abs(vol).toFixed(3) + "}";
    return (
      <div style={{marginTop:12,padding:14,background:"#111827",borderRadius:8,borderLeft:"3px solid #51cf66"}}>
        <Tex math={integral} />
        <div style={{marginTop:6}}><TexInline math={evalTex} /></div>
        <div style={{marginTop:4,fontSize:11,color:"#888",fontFamily:"monospace"}}>Note: ∫r dr = r²/2</div>
      </div>
    );
  }

  // Spherical
  const vol = (sr2**3-sr1**3)/3 * (snapRad(st2)-snapRad(st1)) * (Math.cos(snapRad(sp1))-Math.cos(snapRad(sp2)));
  const integral = "V = \\int_{" + stA + "}^{" + stB + "} \\int_{" + spA + "}^{" + spB + "} \\int_{" + rhoA + "}^{" + rhoB + "} \\rho^2 \\sin\\varphi\\,d\\rho\\,d\\varphi\\,d\\theta";
  const evalTex = "= \\left(" + stB + "-" + stA + "\\right)\\cdot\\bigl(\\cos(" + spA + ")-\\cos(" + spB + ")\\bigr)\\cdot\\frac{" + rhoB + "^3-" + rhoA + "^3}{3} = \\underline{" + Math.abs(vol).toFixed(3) + "}";
  return (
    <div style={{marginTop:12,padding:14,background:"#111827",borderRadius:8,borderLeft:"3px solid #c882ff"}}>
      <Tex math={integral} />
      <div style={{marginTop:6}}><TexInline math={evalTex} /></div>
      <div style={{marginTop:4,fontSize:11,color:"#888",fontFamily:"monospace"}}>Note: ∫ρ² dρ = ρ³/3, ∫sin(φ) dφ = −cos(φ)</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COMPARISON DATA & COMPONENT
   ═══════════════════════════════════════════════ */

const compareRegions = [
  { name: "Sphere", desc: "x²+y²+z² ≤ R²",
    params: { R: 1.3 },
    best: "sph",
    systems: {
      rect: { complexity: 3, label: "Hard",
        boundsTex: (p) => [
          "x \\in [-" + p.R + ",\\," + p.R + "]",
          "y \\in [-\\sqrt{R^2-x^2},\\,\\sqrt{R^2-x^2}]",
          "z \\in [-\\sqrt{R^2-x^2-y^2},\\,\\sqrt{R^2-x^2-y^2}]"
        ],
        dvTex: "dz\\,dy\\,dx", note: "Nested square-root bounds" },
      cyl: { complexity: 2, label: "Medium",
        boundsTex: (p) => [
          "\\theta \\in [0,\\,2\\pi]",
          "r \\in [0,\\," + p.R + "]",
          "z \\in [-\\sqrt{R^2-r^2},\\,\\sqrt{R^2-r^2}]"
        ],
        dvTex: "r\\,dz\\,dr\\,d\\theta", note: "Still has √ in z bounds" },
      sph: { complexity: 1, label: "Easy",
        boundsTex: (p) => [
          "\\theta \\in [0,\\,2\\pi]",
          "\\varphi \\in [0,\\,\\pi]",
          "\\rho \\in [0,\\," + p.R + "]"
        ],
        dvTex: "\\rho^2\\sin\\varphi\\,d\\rho\\,d\\varphi\\,d\\theta", note: "All constant bounds!" },
    },
    draw: (ctx,rx,ry,s,cx,cy,p) => drawSphWedgeSolid(ctx,rx,ry,s,cx,cy, 0,p.R,0,Math.PI*2,0,Math.PI, "rgba(150,120,255,0.25)","rgba(150,120,255,0.5)"),
    vol: (p) => 4/3*Math.PI*p.R**3,
  },
  { name: "Cylinder", desc: "x²+y² ≤ r², 0 ≤ z ≤ h",
    params: { r: 1.0, h: 1.8 },
    best: "cyl",
    systems: {
      rect: { complexity: 2, label: "Medium",
        boundsTex: (p) => [
          "x \\in [-" + p.r + ",\\," + p.r + "]",
          "y \\in [-\\sqrt{r^2-x^2},\\,\\sqrt{r^2-x^2}]",
          "z \\in [0,\\," + p.h + "]"
        ],
        dvTex: "dz\\,dy\\,dx", note: "√ in y bounds" },
      cyl: { complexity: 1, label: "Easy",
        boundsTex: (p) => [
          "\\theta \\in [0,\\,2\\pi]",
          "r \\in [0,\\," + p.r + "]",
          "z \\in [0,\\," + p.h + "]"
        ],
        dvTex: "r\\,dr\\,dz\\,d\\theta", note: "All constant bounds!" },
      sph: { complexity: 3, label: "Hard",
        boundsTex: (p) => [
          "\\theta \\in [0,\\,2\\pi]",
          "\\varphi \\in [0,\\,\\pi]",
          "\\rho: \\text{piecewise}"
        ],
        dvTex: "\\rho^2\\sin\\varphi\\,d\\rho\\,d\\varphi\\,d\\theta", note: "Piecewise ρ bounds — not natural" },
    },
    draw: (ctx,rx,ry,s,cx,cy,p) => drawCylWedgeSolid(ctx,rx,ry,s,cx,cy, 0,p.r,0,Math.PI*2,0,p.h, "rgba(80,210,170,0.25)","rgba(80,210,170,0.5)"),
    vol: (p) => Math.PI*p.r**2*p.h,
  },
  { name: "Box", desc: "0≤x≤a, 0≤y≤b, 0≤z≤c",
    params: { a: 1.4, b: 1.0, c: 0.8 },
    best: "rect",
    systems: {
      rect: { complexity: 1, label: "Easy",
        boundsTex: (p) => [
          "x \\in [0,\\," + p.a + "]",
          "y \\in [0,\\," + p.b + "]",
          "z \\in [0,\\," + p.c + "]"
        ],
        dvTex: "dz\\,dy\\,dx", note: "All constant bounds!" },
      cyl: { complexity: 3, label: "Hard",
        boundsTex: (p) => [
          "\\theta: \\text{piecewise by quadrant}",
          "r: \\text{depends on } \\theta",
          "z \\in [0,\\," + p.c + "]"
        ],
        dvTex: "r\\,dr\\,dz\\,d\\theta", note: "r bound depends on θ — very messy" },
      sph: { complexity: 3, label: "Hard",
        boundsTex: (p) => [
          "\\text{All bounds are piecewise}",
          "\\text{functions of the other}",
          "\\text{variables}"
        ],
        dvTex: "\\rho^2\\sin\\varphi\\,d\\rho\\,d\\varphi\\,d\\theta", note: "Terrible — nothing lines up" },
    },
    draw: (ctx,rx,ry,s,cx,cy,p) => drawBox3d(ctx,rx,ry,s,cx,cy, [0,p.a],[0,p.b],[0,p.c]),
    vol: (p) => p.a*p.b*p.c,
  },
];

function CompareView({ region }) {
  const reg = compareRegions[region];
  const sysNames = { rect: "Rectangular", cyl: "Cylindrical", sph: "Spherical" };
  const sysColors = { rect: "#74c0fc", cyl: "#51cf66", sph: "#c882ff" };

  return (
    <div style={{marginTop:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {["rect","cyl","sph"].map(sk => {
          const info = reg.systems[sk];
          const isBest = reg.best === sk;
          const color = sysColors[sk];
          return (
            <div key={sk} style={{padding:10,background:isBest?"#111d15":"#111827",borderRadius:8,
              border:isBest?`2px solid ${color}`:"1px solid #222",position:"relative"}}>
              {isBest && <div style={{position:"absolute",top:-8,right:8,background:"#111",padding:"1px 8px",
                borderRadius:4,fontSize:10,color,fontWeight:600,border:`1px solid ${color}`}}>BEST FIT</div>}
              <div style={{fontSize:12,color,fontWeight:600,marginBottom:6}}>{sysNames[sk]}</div>
              <div style={{marginBottom:6,lineHeight:"20px"}}>
                {info.boundsTex(reg.params).map((b,j) => <div key={j}><TexInline math={b} /></div>)}
              </div>
              <div style={{marginBottom:4}}>
                <TexInline math={"dV = " + info.dvTex} />
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                {[1,2,3].map(i => (
                  <span key={i} style={{width:8,height:8,borderRadius:"50%",
                    background:i<=info.complexity?(info.complexity===1?"#51cf66":info.complexity===2?"#ffd43b":"#ff6b6b"):"#333"}} />
                ))}
                <span style={{fontSize:10,color:info.complexity===1?"#51cf66":info.complexity===2?"#ffd43b":"#ff6b6b",marginLeft:4}}>
                  {info.label}
                </span>
              </div>
              <div style={{fontSize:10,color:"#666",marginTop:4,fontStyle:"italic"}}>{info.note}</div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:8,fontSize:13,fontFamily:"monospace",color:"#74c0fc",textAlign:"center"}}>
        Volume = {reg.vol(reg.params).toFixed(3)}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════ */

const DV_DR = 0.13, DV_DT = 0.18, DV_DZ = 0.13, DV_DP = 0.15;

function App() {
  const [sys, setSys] = useState("rect");
  const [showDV, setShowDV] = useState(false);
  const [compareRegion, setCompareRegion] = useState(0);

  // Rectangular
  const [rx1,setRx1]=useState(0);
  const [rx2,setRx2]=useState(1.2);
  const [ry1,setRy1]=useState(0);
  const [ry2,setRy2]=useState(1.0);
  const [rz1,setRz1]=useState(0);
  const [rz2,setRz2]=useState(0.8);

  // Cylindrical
  const [cr1,setCr1]=useState(0);
  const [cr2,setCr2]=useState(1.2);
  const [ct1,setCt1]=useState(0);
  const [ct2,setCt2]=useState(Math.PI*1.5);
  const [cz1,setCz1]=useState(0);
  const [cz2,setCz2]=useState(1.2);

  // Spherical
  const [sr1,setSr1]=useState(0);
  const [sr2,setSr2]=useState(1.4);
  const [st1,setSt1]=useState(0);
  const [st2,setSt2]=useState(Math.PI*2);
  const [sp1,setSp1]=useState(0);
  const [sp2,setSp2]=useState(Math.PI*0.75);

  // dV element position
  const [dvR, setDvR] = useState(0.5);
  const [dvRho, setDvRho] = useState(0.7);
  const [dvPhi, setDvPhi] = useState(Math.PI/4);
  const [dvPos, setDvPos] = useState(0.4);

  const draw = useCallback((ctx, rotx, roty, w, h, zm = 1) => {
    const baseScale = Math.min(w, h) * 0.16;
    const s = baseScale * zm, cx = w/2, cy = h/2;
    const fs = Math.max(12, Math.round(w / 38)); // font size scales with width
    drawGrid(ctx,rotx,roty,s,cx,cy);
    drawAxes(ctx,rotx,roty,s,cx,cy,2.2,fs);

    if (sys==="compare") {
      const reg = compareRegions[compareRegion];
      reg.draw(ctx,rotx,roty,s,cx,cy,reg.params);
      ctx.fillStyle="#e0e0e0"; ctx.font=fs+"px monospace";
      ctx.fillText(`${reg.name}: ${reg.desc}`,10,fs+8);
      ctx.fillStyle="#74c0fc"; ctx.fillText(`Volume = ${reg.vol(reg.params).toFixed(3)}`,10,fs*2+10);
      const best = reg.best==="rect"?"Rectangular":reg.best==="cyl"?"Cylindrical":"Spherical";
      ctx.fillStyle="#51cf66"; ctx.fillText(`Best system: ${best}`,10,fs*3+12);
    } else if (sys==="rect") {
      drawBox3d(ctx,rotx,roty,s,cx,cy, [rx1,rx2],[ry1,ry2],[rz1,rz2]);
      if (showDV) {
        const x0 = rx1 + dvPos * (rx2-rx1) * 0.8, y0 = ry1 + dvPos * (ry2-ry1) * 0.8, z0 = rz1 + dvPos * (rz2-rz1) * 0.8;
        drawBox3d(ctx,rotx,roty,s,cx,cy, [x0,x0+DV_DR],[y0,y0+DV_DR],[z0,z0+DV_DZ], "rgba(255,180,50,0.7)");
      }
      const vol = Math.abs((rx2-rx1)*(ry2-ry1)*(rz2-rz1));
      ctx.fillStyle="#e0e0e0"; ctx.font=fs+"px monospace";
      ctx.fillText(`Rectangular: [${rx1.toFixed(1)},${rx2.toFixed(1)}]×[${ry1.toFixed(1)},${ry2.toFixed(1)}]×[${rz1.toFixed(1)},${rz2.toFixed(1)}]`,10,fs+8);
      ctx.fillStyle="#aaa"; ctx.fillText("dV = dx dy dz",10,fs*2+10);
      ctx.fillStyle="#74c0fc"; ctx.fillText(`Volume = ${vol.toFixed(3)}`,10,fs*3+12);
    } else if (sys==="cyl") {
      drawCylWedgeSolid(ctx,rotx,roty,s,cx,cy, cr1,cr2,ct1,ct2,cz1,cz2);
      if (showDV) {
        const t0 = ct1 + (ct2-ct1) * 0.35;
        const zMid = cz1 + (cz2-cz1)*0.3;
        drawCylWedgeSolid(ctx,rotx,roty,s,cx,cy, dvR, dvR+DV_DR, t0, t0+DV_DT, zMid, zMid+DV_DZ,
          "rgba(255,180,50,0.75)", "rgba(255,200,80,0.9)");
      }
      const vol = (cr2*cr2-cr1*cr1)/2 * (snapRad(ct2)-snapRad(ct1)) * (cz2-cz1);
      ctx.fillStyle="#e0e0e0"; ctx.font=fs+"px monospace";
      ctx.fillText(`Cylindrical: r∈[${cr1.toFixed(1)},${cr2.toFixed(1)}], θ∈[${fmtRad(ct1)},${fmtRad(ct2)}], z∈[${cz1.toFixed(1)},${cz2.toFixed(1)}]`,10,fs+8);
      ctx.fillStyle="#aaa"; ctx.fillText("dV = r dr dθ dz",10,fs*2+10);
      ctx.fillStyle="#74c0fc"; ctx.fillText(`Volume = ${Math.abs(vol).toFixed(3)}`,10,fs*3+12);
    } else {
      drawSphWedgeSolid(ctx,rotx,roty,s,cx,cy, sr1,sr2,st1,st2,sp1,sp2);
      if (showDV) {
        const t0 = st1 + (st2-st1) * 0.3;
        drawSphWedgeSolid(ctx,rotx,roty,s,cx,cy, dvRho, dvRho+DV_DR, t0, t0+DV_DT, dvPhi, dvPhi+DV_DP,
          "rgba(255,180,50,0.75)", "rgba(255,200,80,0.9)");
      }
      const _st1=snapRad(st1),_st2=snapRad(st2),_sp1=snapRad(sp1),_sp2=snapRad(sp2);
      const vol = (sr2**3-sr1**3)/3 * (_st2-_st1) * (Math.cos(_sp1)-Math.cos(_sp2));
      ctx.fillStyle="#e0e0e0"; ctx.font=fs+"px monospace";
      ctx.fillText(`Spherical: ρ∈[${sr1.toFixed(1)},${sr2.toFixed(1)}], θ∈[${fmtRad(st1)},${fmtRad(st2)}], φ∈[${fmtRad(sp1)},${fmtRad(sp2)}]`,10,fs+8);
      ctx.fillStyle="#aaa"; ctx.fillText("dV = ρ² sin(φ) dρ dθ dφ",10,fs*2+10);
      ctx.fillStyle="#74c0fc"; ctx.fillText(`Volume = ${Math.abs(vol).toFixed(3)}`,10,fs*3+12);
    }
  }, [sys, rx1,rx2,ry1,ry2,rz1,rz2, cr1,cr2,ct1,ct2,cz1,cz2, sr1,sr2,st1,st2,sp1,sp2, showDV, dvR, dvRho, dvPhi, dvPos, compareRegion]);

  return (
    <div style={{maxWidth:1200,margin:"0 auto",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#e0e0e0",padding:16}}>
      <h2 style={{margin:"0 0 4px",fontSize:22,color:"#fff"}}>Triple Integrals — Coordinate Systems</h2>
      <p style={{margin:"0 0 14px",fontSize:13,color:"#666"}}>Set coordinate ranges to build a region. Drag to rotate. Compare the volume element dV across systems.</p>

      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        {[["rect","Rectangular"],["cyl","Cylindrical"],["sph","Spherical"]].map(([k,l])=>
          <Btn key={k} active={sys===k} onClick={()=>setSys(k)}>{l}</Btn>
        )}
        <span style={{borderLeft:"1px solid #333",margin:"0 4px"}}/>
        <Btn active={sys==="compare"} onClick={()=>setSys("compare")}>Compare All</Btn>
      </div>

      <Scene3D draw={draw} deps={[sys,rx1,rx2,ry1,ry2,rz1,rz2,cr1,cr2,ct1,ct2,cz1,cz2,sr1,sr2,st1,st2,sp1,sp2,showDV,dvR,dvRho,dvPhi,dvPos,compareRegion]} />

      {sys==="compare" && (
        <div style={{marginTop:10}}>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            {compareRegions.map((r,i) => (
              <Btn key={i} active={compareRegion===i} onClick={()=>setCompareRegion(i)}>{r.name}</Btn>
            ))}
          </div>
          <CompareView region={compareRegion} />
        </div>
      )}

      <div style={{marginTop:12}}>
        {sys==="rect" && <>
          <Slider label="x min" value={rx1} onChange={v=>setRx1(Math.min(v,rx2))} min={-2} max={2}/>
          <Slider label="x max" value={rx2} onChange={v=>setRx2(Math.max(v,rx1))} min={-2} max={2}/>
          <Slider label="y min" value={ry1} onChange={v=>setRy1(Math.min(v,ry2))} min={-2} max={2}/>
          <Slider label="y max" value={ry2} onChange={v=>setRy2(Math.max(v,ry1))} min={-2} max={2}/>
          <Slider label="z min" value={rz1} onChange={v=>setRz1(Math.min(v,rz2))} min={-2} max={2}/>
          <Slider label="z max" value={rz2} onChange={v=>setRz2(Math.max(v,rz1))} min={-2} max={2}/>
        </>}
        {sys==="cyl" && <>
          <Slider label="r min" value={cr1} onChange={v=>setCr1(Math.min(v,cr2))} min={0} max={2}/>
          <Slider label="r max" value={cr2} onChange={v=>setCr2(Math.max(v,cr1))} min={0} max={2}/>
          <Slider label="θ min" value={ct1} onChange={v=>{const s=snapRad(v);setCt1(Math.min(s,ct2));}} min={0} max={Math.PI*2} step={PI_STEP} radians/>
          <Slider label="θ max" value={ct2} onChange={v=>{const s=snapRad(v);setCt2(Math.max(s,ct1));}} min={0} max={Math.PI*2} step={PI_STEP} radians/>
          <Slider label="z min" value={cz1} onChange={v=>setCz1(Math.min(v,cz2))} min={-2} max={2}/>
          <Slider label="z max" value={cz2} onChange={v=>setCz2(Math.max(v,cz1))} min={-2} max={2}/>
        </>}
        {sys==="sph" && <>
          <Slider label="ρ min" value={sr1} onChange={v=>setSr1(Math.min(v,sr2))} min={0} max={10}/>
          <Slider label="ρ max" value={sr2} onChange={v=>setSr2(Math.max(v,sr1))} min={0} max={10}/>
          <Slider label="θ min" value={st1} onChange={v=>{const s=snapRad(v);setSt1(Math.min(s,st2));}} min={0} max={Math.PI*2} step={PI_STEP} radians/>
          <Slider label="θ max" value={st2} onChange={v=>{const s=snapRad(v);setSt2(Math.max(s,st1));}} min={0} max={Math.PI*2} step={PI_STEP} radians/>
          <Slider label="φ min" value={sp1} onChange={v=>{const s=snapRad(v);setSp1(Math.min(s,sp2));}} min={0} max={Math.PI} step={PI_STEP} radians/>
          <Slider label="φ max" value={sp2} onChange={v=>{const s=snapRad(v);setSp2(Math.max(s,sp1));}} min={0} max={Math.PI} step={PI_STEP} radians/>
        </>}
      </div>

      {sys!=="compare" && <>
      <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8}}>
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:showDV?"#ffd43b":"#888"}}>
          <input type="checkbox" checked={showDV} onChange={e=>setShowDV(e.target.checked)} style={{accentColor:"#ffd43b"}} />
          Show dV element
        </label>
        {showDV && <span style={{fontSize:11,color:"#666"}}>
          {sys==="rect" ? "Move the element — notice it stays the same size everywhere" :
           sys==="cyl" ? "Drag r to see the element stretch as r increases" :
           "Drag ρ and φ to see how the element changes shape"}
        </span>}
      </div>

      {showDV && (
        <div style={{marginTop:6,padding:10,background:"#1a1520",borderRadius:8,borderLeft:"3px solid #ffd43b"}}>
          {sys==="rect" && <>
            <Slider label="position" value={dvPos} onChange={setDvPos} min={0} max={0.9} step={0.02} />
            <div style={{fontSize:13,fontFamily:"monospace",color:"#ffd43b",marginTop:4}}>
              dV = dx dy dz = {DV_DR.toFixed(2)} · {DV_DR.toFixed(2)} · {DV_DZ.toFixed(2)} = <span style={{color:"#fff"}}>{(DV_DR*DV_DR*DV_DZ).toFixed(4)}</span>
              <span style={{color:"#888",marginLeft:8}}>← same everywhere!</span>
            </div>
          </>}
          {sys==="cyl" && <>
            <Slider label="r position" value={dvR} onChange={setDvR} min={0.05} max={1.8} step={0.02} />
            <div style={{fontSize:13,fontFamily:"monospace",color:"#ffd43b",marginTop:4}}>
              dV = <span style={{color:"#fff",fontWeight:"bold"}}>r</span> dr dθ dz
              = <span style={{color:"#fff",fontWeight:"bold"}}>{dvR.toFixed(2)}</span> · {DV_DR.toFixed(2)} · {DV_DT.toFixed(2)} · {DV_DZ.toFixed(2)}
              = <span style={{color:"#fff"}}>{(dvR * DV_DR * DV_DT * DV_DZ).toFixed(4)}</span>
            </div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>
              At r = {dvR.toFixed(2)}: element is {dvR < 0.3 ? "tiny" : dvR < 0.8 ? "moderate" : "large"} — {dvR < 0.15 ? "near the axis, r ≈ 0 shrinks dV toward zero" : "the r factor makes dV grow with distance from the z-axis"}
            </div>
          </>}
          {sys==="sph" && <>
            <Slider label="position ρ" value={dvRho} onChange={setDvRho} min={0.05} max={1.8} step={0.02} />
            <Slider label="position φ" value={dvPhi} onChange={setDvPhi} min={0.05} max={Math.PI-0.2} step={0.03} radians />
            <div style={{fontSize:13,fontFamily:"monospace",color:"#ffd43b",marginTop:4}}>
              dV = <span style={{color:"#fff",fontWeight:"bold"}}>ρ<sup>2</sup> sin(φ)</span> dρ dθ dφ
              = <span style={{color:"#fff",fontWeight:"bold"}}>{dvRho.toFixed(2)}</span><sup>2</sup>
              · sin(<span style={{color:"#fff",fontWeight:"bold"}}>{fmtRad(dvPhi)}</span>)
              · {DV_DR.toFixed(2)} · {DV_DT.toFixed(2)} · {DV_DP.toFixed(2)}
              = <span style={{color:"#fff"}}>{(dvRho*dvRho * Math.sin(dvPhi) * DV_DR * DV_DT * DV_DP).toFixed(4)}</span>
            </div>
            <div style={{fontSize:11,color:"#888",marginTop:2}}>
              ρ<sup>2</sup> = {(dvRho*dvRho).toFixed(2)} — {dvRho < 0.3 ? "small ρ → tiny element near origin" : "element grows quadratically with ρ"}
              {" | "}sin(φ) = {Math.sin(dvPhi).toFixed(2)} — {dvPhi < 0.4 ? "near north pole: element is small" : dvPhi > 2.7 ? "near south pole: element is small" : "near equator: sin(φ) ≈ 1, element is widest"}
            </div>
          </>}
        </div>
      )}
      </>}

      {sys!=="compare" && <IntegralDisplay sys={sys} rx1={rx1} rx2={rx2} ry1={ry1} ry2={ry2} rz1={rz1} rz2={rz2} cr1={cr1} cr2={cr2} ct1={ct1} ct2={ct2} cz1={cz1} cz2={cz2} sr1={sr1} sr2={sr2} st1={st1} st2={st2} sp1={sp1} sp2={sp2} />}

      {sys!=="compare" && <div style={{marginTop:12,padding:12,background:"#16213e",borderRadius:8,fontSize:13,color:"#ccc",fontFamily:"monospace"}}>
        {sys==="rect" && "Rectangular: constant-coordinate surfaces are planes. The volume element dV = dx dy dz is a small box."}
        {sys==="cyl" && "Cylindrical: r=const is a cylinder, θ=const is a half-plane, z=const is a horizontal plane. dV = r dr dθ dz — don't forget the r!"}
        {sys==="sph" && "Spherical: ρ=const is a sphere, θ=const is a vertical half-plane, φ=const is a cone. dV = ρ² sin(φ) dρ dθ dφ"}
      </div>}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
